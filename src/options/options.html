<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cinder Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 560px;
      margin: 32px auto;
      padding: 0 16px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 13px; }
    label {
      display: block;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      font: inherit;
      margin-top: 4px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
    }
    input:focus, select:focus { outline: 2px solid #6080c0; outline-offset: -1px; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button {
      margin-top: 22px;
      padding: 8px 16px;
      cursor: pointer;
      font: inherit;
      border: 1px solid #888;
      border-radius: 4px;
      background: #fff;
    }
    button:hover { background: #f0f0f0; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
    .hint a { color: #4060a0; }
    .status { margin-top: 12px; font-size: 13px; color: #060; min-height: 1em; }
  </style>
</head>
<body>
  <h1>Cinder Settings</h1>
  <div class="subtitle">YouTube → Obsidian notes via Gemini.</div>

  <label>Gemini API Key
    <input type="password" id="geminiKey" autocomplete="off" />
    <div class="hint">Get one from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</div>
  </label>

  <label>Chunk model chain
    <input type="text" id="geminiModel" placeholder="gemini-2.5-flash, gemini-2.5-flash-lite" autocomplete="off" />
    <div class="hint">Runs on every chunk during playback. Comma-separated fallback list — if the first hits a rate limit, Cinder tries the next.</div>
  </label>

  <label>Final model chain
    <input type="text" id="geminiFinalModel" placeholder="gemini-3-pro, gemini-2.5-pro, gemini-2.5-flash" autocomplete="off" />
    <div class="hint">One call when you save. Put your strongest model first; fallbacks kick in on quota errors. Leave blank to reuse the chunk chain.</div>
  </label>

  <div class="hint" style="margin-top: 6px;">Any Gemini model ID your key has access to works. See <a href="https://ai.google.dev/gemini-api/docs/models" target="_blank">Gemini docs</a> for the current list.</div>

  <label>Obsidian Local REST URL
    <input type="text" id="obsidianUrl" placeholder="https://127.0.0.1:27124" />
    <div class="hint">Install the <a href="https://github.com/coddingtonbear/obsidian-local-rest-api" target="_blank">Local REST API</a> community plugin in Obsidian.</div>
  </label>

  <label>Obsidian API Token
    <input type="password" id="obsidianToken" autocomplete="off" />
  </label>

  <div class="row">
    <div>
      <label>Inbox folder
        <input type="text" id="inboxFolder" placeholder="Inbox" />
        <div class="hint">Where new notes land.</div>
      </label>
    </div>
    <div>
      <label>Chunk interval (min)
        <input type="number" id="chunkMinutes" min="1" max="30" value="5" />
        <div class="hint">Watched-time per chunk.</div>
      </label>
    </div>
  </div>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
