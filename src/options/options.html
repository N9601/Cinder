<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cinder Settings</title>
  <link rel="icon" type="image/svg+xml" href="../../icons/logo.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="../../icons/icon48.png" />
  <style>
    :root {
      --bg: #1a1a1a;
      --panel: #232323;
      --panel-2: #2b2b2b;
      --border: #2e2e2e;
      --border-2: #3a3a3a;
      --text: #e8e8e8;
      --muted: #828282;
      --primary: #ff7a45;
      --primary-hover: #ff8b5c;
      --primary-press: #1a0d05;
      --success: #6fcf85;
      --link: #ffaa7d;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 40px 16px 80px;
    }
    .wrap { max-width: 620px; margin: 0 auto; }

    header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .brand-mark {
      width: 32px; height: 32px; display: block;
      filter: drop-shadow(0 0 8px rgba(160, 152, 181, 0.3));
    }
    h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px 22px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"], input[type="password"], input[type="number"], select {
      width: 100%;
      padding: 9px 11px;
      font: inherit;
      font-size: 13px;
      margin-top: 6px;
      border: 1px solid var(--border-2);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: #2f2f2f;
    }
    input::placeholder { color: #5a5a5a; }
    select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M2 4 L6 8 L10 4' stroke='%23828282' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 12px;
      padding-right: 32px;
      cursor: pointer;
    }
    select option { background: var(--panel-2); color: var(--text); }

    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint a { color: var(--link); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }

    button {
      padding: 10px 22px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--primary);
      border-radius: 6px;
      background: var(--primary);
      color: var(--primary-press);
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .status {
      font-size: 13px;
      color: var(--success);
      min-height: 1em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="brand-mark" src="../../icons/logo.svg" alt="" aria-hidden="true" />
      <div>
        <h1>Cinder Settings</h1>
        <div class="subtitle">YouTube → Obsidian notes via Gemini.</div>
      </div>
    </header>

    <section class="section">
      <div class="section-title">Gemini</div>

      <label>API key
        <input type="password" id="geminiKey" autocomplete="off" placeholder="AIza…" />
        <div class="hint">Get one from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</div>
      </label>

      <label>Chunk model
        <select id="geminiModel">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash — fast, default</option>
          <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite — cheapest</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          <option value="gemini-3-pro">Gemini 3 Pro</option>
        </select>
        <div class="hint">Runs on every chunk during playback. Cinder auto-falls-back to a cheaper model if this one hits a rate limit.</div>
      </label>

      <label>Final model
        <select id="geminiFinalModel">
          <option value="gemini-3-pro">Gemini 3 Pro — best, default</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
          <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
          <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite</option>
        </select>
        <div class="hint">One call when you save the note. Auto-falls-back to the next-best model on quota errors.</div>
      </label>
    </section>

    <section class="section">
      <div class="section-title">Obsidian Vault</div>

      <label>Local REST URL
        <input type="text" id="obsidianUrl" placeholder="http://127.0.0.1:27123" />
        <div class="hint">Install the <a href="https://github.com/coddingtonbear/obsidian-local-rest-api" target="_blank">Local REST API</a> community plugin in Obsidian. HTTP on 27123 avoids self-signed cert issues.</div>
      </label>

      <label>API token
        <input type="password" id="obsidianToken" autocomplete="off" placeholder="Bearer token from the plugin settings" />
      </label>

      <label>Inbox folder
        <input type="text" id="inboxFolder" placeholder="Inbox" />
        <div class="hint">Where new notes land. The folder must already exist in your vault.</div>
      </label>
    </section>

    <section class="section">
      <div class="section-title">Behavior</div>

      <label>Chunk interval (minutes)
        <input type="number" id="chunkMinutes" min="1" max="30" value="5" />
        <div class="hint">Watched-time per chunk. Lower = more frequent API calls but faster feedback.</div>
      </label>
    </section>

    <div class="actions">
      <button id="save">Save settings</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
